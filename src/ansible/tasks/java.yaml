---
# Java installation via SDKMAN

- name: "Install Java 21 (LTS) via SDKMAN"
  ansible.builtin.shell: |
    source {{ ansible_facts.env.HOME }}/.sdkman/bin/sdkman-init.sh && sdk install java 21-tem
  args:
    executable: "{{ sdkman_shell }}"
  register: java_install_result
  changed_when: "'is already installed' not in java_install_result.stdout"
  tags:
    - java
    - sdkman

- name: "Install Java development tools via SDKMAN"
  ansible.builtin.shell: |
    source {{ ansible_facts.env.HOME }}/.sdkman/bin/sdkman-init.sh && sdk install {{ item }}
  args:
    executable: "{{ sdkman_shell }}"
  loop:
    - maven
    - gradle
  register: tool_install_result
  changed_when: "'is already installed' not in tool_install_result.stdout"
  tags:
    - java
    - sdkman

# jdtls (Eclipse JDT Language Server, Java LSP).
- name: "Install jdtls (macOS)"
  community.general.homebrew:
    name: "{{ jdtls.brew_formulae }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - java
    - jdtls

# Debian: no apt package. Extract the arch-independent Eclipse tarball into
# ~/.local/share/jdtls and symlink its bin/jdtls launcher onto PATH. The
# launcher needs python3 (system) + java (SDKMAN, above).
- name: "Create jdtls install directory (Debian)"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.local/share/jdtls"
    state: directory
    mode: '0755'
  when: ansible_facts.os_family == "Debian"
  tags:
    - java
    - jdtls

- name: "Download and extract jdtls (Debian)"
  ansible.builtin.unarchive:
    src: "{{ jdtls.debian_tarball_url }}"
    dest: "{{ ansible_facts.env.HOME }}/.local/share/jdtls"
    remote_src: true
    creates: "{{ ansible_facts.env.HOME }}/.local/share/jdtls/bin/jdtls"
  when: ansible_facts.os_family == "Debian"
  tags:
    - java
    - jdtls

- name: "Symlink jdtls launcher onto PATH (Debian)"
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.local/share/jdtls/bin/jdtls"
    dest: "{{ ansible_facts.env.HOME }}/.local/bin/jdtls"
    state: link
  when: ansible_facts.os_family == "Debian"
  tags:
    - java
    - jdtls