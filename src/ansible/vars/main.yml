---
# Shared cross-platform configuration. Loaded by local.yaml via vars_files.

modern_cli_versions:
  delta: "0.19.2"
  lazygit: "0.62.1"
  dust: "1.2.4"
  procs: "0.14.11"
  sd: "1.1.0"

modern_cli:
  # macOS: install everything through Homebrew (handles arch automatically).
  brew_formulae:
    - git-delta
    - lazygit
    - dust
    - duf
    - procs
    - sd
    - hyperfine

  # Debian/WSL: tools reliably packaged in Ubuntu Noble universe.
  apt_packages:
    - hyperfine
    - duf

  # Debian/WSL: delta installed from an upstream .deb release.
  delta_deb_url: "https://github.com/dandavison/delta/releases/download/{{ modern_cli_versions.delta }}/git-delta_{{ modern_cli_versions.delta }}_amd64.deb"

  # Debian/WSL: release binaries extracted into ~/.local/bin (x86_64 only).
  # extra_opts handles each archive's layout: tarballs with a nested dir use
  # --strip-components=1; zips with files at root use -j; lazygit's tarball is flat.
  release_binaries:
    - name: lazygit
      url: "https://github.com/jesseduffield/lazygit/releases/download/v{{ modern_cli_versions.lazygit }}/lazygit_{{ modern_cli_versions.lazygit }}_linux_x86_64.tar.gz"
      extra_opts: []
    - name: dust
      url: "https://github.com/bootandy/dust/releases/download/v{{ modern_cli_versions.dust }}/dust-v{{ modern_cli_versions.dust }}-x86_64-unknown-linux-gnu.tar.gz"
      extra_opts: ["--strip-components=1"]
    - name: sd
      url: "https://github.com/chmln/sd/releases/download/v{{ modern_cli_versions.sd }}/sd-v{{ modern_cli_versions.sd }}-x86_64-unknown-linux-gnu.tar.gz"
      extra_opts: ["--strip-components=1"]
    - name: procs
      url: "https://github.com/dalance/procs/releases/download/v{{ modern_cli_versions.procs }}/procs-v{{ modern_cli_versions.procs }}-x86_64-linux.zip"
      extra_opts: ["-j"]

# ---------- SP2/SP3 cross-platform package data ----------

core:
  # macOS: gnupg for key handling + pinentry-mac for the native GPG passphrase
  # dialog (the dotfiles' gpg-agent setup prefers it). locales/ca-certs are native.
  brew_formulae:
    - gnupg
    - pinentry-mac
  # macOS powerline glyphs come from a nerd-font cask (installed separately).
  brew_cask_fonts:
    - font-meslo-lg-nerd-font

shell:
  brew_formulae:
    - zsh

dotfiles:
  brew_formulae:
    - stow

tools:
  # Debian apt list (moved verbatim out of tools.yaml).
  apt_packages:
    - tmux
    - jq
    - xclip
    - tldr
    - fzf
    - curl
    - wget
    - btop
    - lsof
    - unzip
    - zip
    - gettext
    - tofrodos
    - neofetch
    - rsync
    - tree
    - expect
    - bat
    - ripgrep
    - shellcheck
  apt_build_tools:
    - build-essential
    - cmake
    - pkg-config
    - libpthread-stubs0-dev
    - lua5.1
    - libtool
    - libtool-bin
    - ninja-build
  # macOS: brew names (built-ins curl/zip/unzip/lsof/rsync/man omitted;
  # X11-only xclip omitted -> pbcopy/pbpaste; tofrodos -> dos2unix;
  # build-essential -> Xcode CLT assumed present).
  # neofetch -> fastfetch: neofetch is discontinued upstream and was removed
  # from Homebrew; fastfetch is its maintained drop-in successor. (Debian/Noble
  # has no fastfetch package, so the apt list above keeps neofetch for now.)
  brew_formulae:
    - tmux
    - jq
    - fzf
    - wget
    - btop
    - gettext
    - tldr
    - fastfetch
    - tree
    - expect
    - bat
    - ripgrep
    - eza
    - dos2unix
    - cmake
    - ninja
    - pkg-config
    - libtool
    - lua
    - shellcheck

# Desktop GUI apps. bloom + AeroSpace are macOS-only (no Linux equivalent in
# this dev-env); VLC is cross-platform (Homebrew Cask on macOS, apt on Debian).
apps:
  brew_casks:
    - bloom
    - nikitabobko/tap/aerospace
    - vlc
  apt_packages:
    - vlc

# jdtls (Eclipse JDT Language Server, Java LSP). macOS: Homebrew formula.
# Debian: no apt package, so install the Eclipse release tarball — it's
# arch-independent (pure Java), so unlike the release binaries it also covers
# arm64. The milestone filename embeds a build timestamp, so the full URL is
# the source of truth (not derivable from the version alone).
jdtls:
  brew_formulae:
    - jdtls
  version: "1.58.0"
  debian_tarball_url: "https://download.eclipse.org/jdtls/milestones/1.58.0/jdt-language-server-1.58.0-202604151538.tar.gz"

neovim:
  brew_formulae:
    - neovim

go:
  brew_formulae:
    - go

# OpenTofu (Terraform fork). Unpinned on both platforms to track latest.
# macOS: Homebrew formula. Debian: no apt package, so add OpenTofu's official
# apt repo (Cloudsmith-hosted) and install the `tofu` package. The repo needs
# two signing keys: the project key + the repo key.
opentofu:
  brew_formulae:
    - opentofu
  apt_key_url: "https://get.opentofu.org/opentofu.gpg"
  apt_repo_key_url: "https://packages.opentofu.org/opentofu/tofu/gpgkey"
  apt_repo: "deb [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main"

# AWS CLI v2. macOS: Homebrew formula (awscli). Debian: apt only ships the
# deprecated v1, so use AWS's official installer zip (always latest; x86_64).
awscli:
  brew_formulae:
    - awscli
  debian_installer_url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"

bitwarden:
  brew_formulae:
    - bitwarden-cli

yazi:
  apt_packages:
    - ffmpeg
    - p7zip-full
    - poppler-utils
    - fd-find
    - ripgrep
    - fzf
    - zoxide
    - imagemagick
  brew_formulae:
    - yazi
    - ffmpeg
    - sevenzip
    - poppler
    - fd
    - ripgrep
    - fzf
    - zoxide
    - imagemagick

# Python is managed by uv (Astral), which downloads prebuilt standalone Pythons —
# no system build dependencies needed, so there's no python: package data here.

# Shell used to run the SDKMAN installer and `sdk` commands. macOS ships only
# bash 3.2, and SDKMAN's installer hard-requires bash 4+ — BUT that check is
# guarded by `[ -n "$BASH_VERSION" ]`, so running under zsh (always present on
# macOS, and SDKMAN supports it) skips the gate entirely. Debian's /bin/bash is
# already 5.x, so it stays on bash. Evaluated lazily against runtime facts.
sdkman_shell: "{{ '/bin/zsh' if ansible_facts.os_family == 'Darwin' else '/bin/bash' }}"

node:
  nvm_version: "v0.40.4"
  node_version: "--lts"

# tflint (Terraform linter). No Homebrew formula — both macOS and Debian install
# the upstream release zip into ~/.local/bin. Version is resolved at runtime via
# the GitHub releases API so it always installs the latest stable release.
# macOS: arm64 or amd64 based on ansible_facts.architecture. Debian: amd64 only.
tflint:
  releases_api_url: "https://api.github.com/repos/terraform-linters/tflint/releases/latest"
