---
# Python toolchain via uv (Astral) — cross-platform (macOS + Debian/WSL).
# uv downloads prebuilt standalone Pythons, so no system build dependencies are
# needed. uv's PATH/completions live in the dotfiles repo, not here, so the
# installer runs with UV_NO_MODIFY_PATH=1.

- name: "Install uv (Astral)"
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | env UV_NO_MODIFY_PATH=1 sh
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"
  tags:
    - initial-setup
    - python
    - uv

- name: "Install Python versions via uv (3.13, 3.12)"
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/uv python install 3.13 3.12"
  register: uv_python_install
  changed_when: "'Installed' in uv_python_install.stdout"
  tags:
    - initial-setup
    - python

- name: "Set the default python (3.13) on PATH via uv"
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/uv python install --default 3.13"
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/python"
  tags:
    - initial-setup
    - python

- name: "Install global Python CLI tools via uv"
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/uv tool install {{ item }}"
  loop:
    - black
    - mypy
    - pylint
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
  tags:
    - initial-setup
    - python
