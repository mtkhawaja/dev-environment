---
# Desktop GUI applications. bloom + AeroSpace are macOS-only (no Linux
# equivalent in this dev-env); VLC is cross-platform (Homebrew Cask on macOS,
# apt on Debian/WSL).

- name: "Install GUI apps via Homebrew Cask (macOS)"
  community.general.homebrew_cask:
    name: "{{ apps.brew_casks }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - initial-setup
    - apps

- name: "Install VLC via apt (Debian)"
  become: true
  ansible.builtin.apt:
    name: "{{ apps.apt_packages }}"
    state: present
    update_cache: true
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - apps
