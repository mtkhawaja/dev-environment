- name: "Install common CLI tools (Debian)"
  become: true
  ansible.builtin.apt:
    name: "{{ tools.apt_packages }}"
    state: present
    update_cache: true
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools

- name: "Download eza GPG key"
  become: true
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
    dest: /tmp/eza.asc
    mode: '0644'
  register: eza_key_downloaded
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools
    - eza

- name: "Import eza GPG key"
  become: true
  ansible.builtin.shell: cat /tmp/eza.asc | gpg --dearmor -o /etc/apt/keyrings/gierens.gpg
  args:
    creates: /etc/apt/keyrings/gierens.gpg
  when: ansible_facts.os_family == "Debian" and eza_key_downloaded is changed
  tags:
    - initial-setup
    - cli-tools
    - eza

- name: "Add eza repository"
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main"
    filename: gierens
    state: present
    update_cache: true
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools
    - eza

- name: "Install eza (Debian)"
  become: true
  ansible.builtin.apt:
    name: eza
    state: present
    update_cache: false
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools
    - eza

- name: "Clean up eza temporary files"
  become: true
  ansible.builtin.file:
    path: /tmp/eza.asc
    state: absent
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools
    - eza

- name: "Install man pages (Debian)"
  become: true
  ansible.builtin.apt:
    name:
      - "man-db"
      - "manpages-posix"
    state: present
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools

- name: "Install build tools (Debian)"
  become: true
  ansible.builtin.apt:
    name: "{{ tools.apt_build_tools }}"
    state: present
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - cli-tools

- name: "Install CLI tools (macOS)"
  community.general.homebrew:
    name: "{{ tools.brew_formulae }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - initial-setup
    - cli-tools
