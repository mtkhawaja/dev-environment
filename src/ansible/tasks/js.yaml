---
# Node.js via nvm (cross-platform: macOS + Debian/WSL).

- name: "Check if nvm is installed"
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  register: nvm_installed
  tags:
    - initial-setup
    - js

# PROFILE=/dev/null stops the nvm installer from editing rc files —
# the NVM_DIR sourcing lines live in the dotfiles repo (.zshenv).
- name: "Install nvm {{ node.nvm_version }}"
  ansible.builtin.shell: |
    curl -fsSL "https://raw.githubusercontent.com/nvm-sh/nvm/{{ node.nvm_version }}/install.sh" | PROFILE=/dev/null bash
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  when: not nvm_installed.stat.exists
  tags:
    - initial-setup
    - js

- name: "Install Node {{ node.node_version }} via nvm and set default"
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install {{ node.node_version }}
    nvm alias default {{ node.node_version }}
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.nvm/alias/default"
  tags:
    - initial-setup
    - js
