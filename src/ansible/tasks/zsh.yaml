- name: "Cleanup existing zsh config files"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ansible_facts.env.HOME }}/.oh-my-zsh"
    - "{{ ansible_facts.env.HOME }}/.zshrc"
    - "{{ ansible_facts.env.HOME }}/.zshenv"
  tags:
    - cleanup-zsh-config

- name: "Check if zsh is installed"
  command: which zsh
  register: is_zsh_installed
  changed_when: false
  failed_when: false
  tags:
    - initial-setup
    - zsh

- name: "Install zsh (Debian)"
  become: true
  ansible.builtin.apt:
    name: zsh
    state: present
  when: is_zsh_installed.rc != 0 and ansible_facts.os_family == "Debian"
  tags:
    - install-zsh

- name: "Install zsh (macOS)"
  community.general.homebrew:
    name: "{{ shell.brew_formulae }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - install-zsh


- name: "Download oh-my-zsh installer"
  ansible.builtin.get_url:
    url: https://raw.github.com/robbyrussell/oh-my-zsh/master/tools/install.sh
    dest: "{{ ansible_facts.env.HOME }}/.oh-my-installer"
    mode: '0700'
  tags:
    - oh-my-zsh-setup

- name: "Install oh-my-zsh"
  ansible.builtin.command: "{{ ansible_facts.env.HOME }}/.oh-my-installer"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.oh-my-zsh"
  tags:
    - oh-my-zsh-setup

- name: "Remove oh-my-zsh installer"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.oh-my-installer"
    state: absent
  tags:
    - oh-my-zsh-setup

- name: "Download zsh-autosuggestions plugin"
  ansible.builtin.git:
    repo: "https://github.com/zsh-users/zsh-autosuggestions.git"
    dest: "{{ ansible_facts.env.HOME }}/.oh-my-zsh/plugins/zsh-autosuggestions"
    clone: yes
    update: yes
  tags:
    - oh-my-zsh-setup

- name: "Download zsh-syntax-highlighting plugin"
  ansible.builtin.git:
    repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    dest: "{{ ansible_facts.env.HOME }}/.oh-my-zsh/plugins/zsh-syntax-highlighting"
    clone: yes
    update: yes
  tags:
    - oh-my-zsh-setup
