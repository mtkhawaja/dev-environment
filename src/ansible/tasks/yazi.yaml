- name: Install optional Yazi dependencies (Debian)
  become: true
  apt:
    name: "{{ yazi.apt_packages }}"
    state: present
    update_cache: true
  when: ansible_facts.os_family == "Debian"
  tags:
    - yazi
    - cli-tools

- name: Ensure fd is symlinked as fd (for compatibility) (Debian)
  become: true
  file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
    force: true
  when: ansible_facts.os_family == "Debian"
  tags:
    - yazi

- name: Ensure ~/.local/bin exists for Yazi binary
  file:
    path: "{{ ansible_facts.env.HOME }}/.local/bin"
    state: directory
    mode: '0755'
  tags:
    - yazi

- name: Download Yazi latest release binary (Debian)
  get_url:
    url: "https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-gnu.zip"
    dest: "/tmp/yazi.zip"
    mode: '0644'
  when: ansible_facts.os_family == "Debian"
  tags:
    - yazi

- name: Unzip Yazi binary to ~/.local/bin (Debian)
  unarchive:
    src: "/tmp/yazi.zip"
    dest: "{{ ansible_facts.env.HOME }}/.local/bin"
    remote_src: yes
    extra_opts: [ "-j" ]  # flatten archive structure
  when: ansible_facts.os_family == "Debian"
  tags:
    - yazi

- name: Make Yazi executable (Debian)
  file:
    path: "{{ ansible_facts.env.HOME }}/.local/bin/yazi"
    mode: '0755'
    state: file
  when: ansible_facts.os_family == "Debian"
  tags:
    - yazi

- name: Install Yazi and dependencies (macOS)
  community.general.homebrew:
    name: "{{ yazi.brew_formulae }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - yazi

# ~/.local/bin is added to PATH in the dotfiles repo (.zshenv), not here.
