- name: "Install GNU Stow (Debian)"
  become: true
  ansible.builtin.apt:
    name: stow
    state: present
  when: ansible_facts.os_family == "Debian"
  tags:
    - initial-setup
    - dotfiles

- name: "Install GNU Stow (macOS)"
  community.general.homebrew:
    name: "{{ dotfiles.brew_formulae }}"
    state: present
  when: ansible_facts.os_family == "Darwin"
  tags:
    - initial-setup
    - dotfiles

- name: "Check if .dotfiles directory exists"
  stat:
    path: "{{ lookup('env', 'HOME') }}/.dotfiles"
  register: dotfiles_dir
  tags:
    - dotfiles

- name: "Archive local dotfiles if uncommitted changes exist"
  shell: |
    cd "$HOME/.dotfiles" && \
    git diff --quiet || \
    tar czf "$HOME/dotfiles-backup-$(date +%Y%m%d-%H%M%S).tar.gz" .
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  when: dotfiles_dir.stat.exists
  tags:
    - dotfiles

- name: "Clone dotfiles (force overwrite any local changes)"
  ansible.builtin.git:
    repo: 'https://github.com/mtkhawaja/dotfiles.git'
    dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: main
    force: yes
  tags:
    - dotfiles

- name: "Stow dotfiles"
  shell: cd "$HOME/.dotfiles" && ./setup.sh
  args:
    executable: /bin/bash
  tags:
    - dotfiles
